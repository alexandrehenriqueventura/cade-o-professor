<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadê o Professor? — E.E. Joaquim Diégues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, collection, doc, setDoc, deleteDoc,
    onSnapshot, getDocs, updateDoc, getDoc, addDoc, serverTimestamp, query, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCUv56_g_5fVQ0Yn7KhmjlavYCpX-B4Hmg",
    authDomain: "cade-o-professor.firebaseapp.com",
    projectId: "cade-o-professor",
    storageBucket: "cade-o-professor.firebasestorage.app",
    messagingSenderId: "1075708683362",
    appId: "1:1075708683362:web:db742bce33ae4e85285d3b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const profsCol = collection(db, "professores");
  const roomsCol = collection(db, "salas");
  const logCol   = collection(db, "historico");

  window._state = { professors: [], rooms: [], isAdmin: false, user: null, currentProf: null, searchQuery: '' };

  function uuidv4() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  const COLORS = ['#2563eb','#7c3aed','#db2777','#dc2626','#d97706','#16a34a','#0891b2','#059669','#9333ea','#c026d3','#ea580c','#65a30d'];
  window.avatarColor = n => { let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[Math.abs(h)]; };
  window.initials = n => n.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');

  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - ts.toMillis()) / 1000);
    if (diff < 60) return 'agora mesmo';
    if (diff < 3600) return `há ${Math.floor(diff/60)} min`;
    if (diff < 86400) return `há ${Math.floor(diff/3600)}h`;
    return `há ${Math.floor(diff/86400)}d`;
  }

  async function checkAdmin(email) {
    if (!email) return false;
    const snap = await getDoc(doc(db, 'admins', email));
    return snap.exists() && snap.data().ativo === true;
  }

  function findProfByEmail(email) {
    if (!email) return null;
    return window._state.professors.find(p => p.email && p.email.toLowerCase() === email.toLowerCase()) || null;
  }

  // ── Modal de confirmação genérico ──────────────────────────────────────────
  function showConfirmModal({ icon = '🗑️', iconType = 'danger', title, body, confirmLabel = 'Confirmar', cancelLabel = 'Cancelar', onConfirm, onCancel }) {
    const modal = document.getElementById('confirm-modal');
    const iconEl = document.getElementById('confirm-modal-icon');
    const titleEl = document.getElementById('confirm-modal-title');
    const bodyEl = document.getElementById('confirm-modal-body');
    const btnConfirm = document.getElementById('confirm-modal-ok');
    const btnCancel = document.getElementById('confirm-modal-cancel');

    iconEl.textContent = icon;
    iconEl.className = 'modal-icon modal-icon-' + iconType;
    titleEl.textContent = title;
    bodyEl.innerHTML = body;
    btnConfirm.textContent = confirmLabel;
    btnCancel.textContent = cancelLabel;

    modal.classList.add('open');

    function cleanup() {
      modal.classList.remove('open');
      btnConfirm.replaceWith(btnConfirm.cloneNode(true));
      btnCancel.replaceWith(btnCancel.cloneNode(true));
    }

    document.getElementById('confirm-modal-ok').addEventListener('click', () => { cleanup(); onConfirm(); }, { once: true });
    document.getElementById('confirm-modal-cancel').addEventListener('click', () => { cleanup(); if (onCancel) onCancel(); }, { once: true });
  }
  window.showConfirmModal = showConfirmModal;
  // ──────────────────────────────────────────────────────────────────────────

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const isAdmin = await checkAdmin(user.email);
      window._state.user = user;
      window._state.isAdmin = isAdmin;
      const currentProf = findProfByEmail(user.email);
      window._state.currentProf = currentProf;
      updateAuthUI(user, isAdmin, currentProf);
      applyAdminAccess(isAdmin);
      renderScannerPanel();
      if (isAdmin) {
        window.showToast('✅ Bem-vindo, Administrador!', 'success');
      } else if (currentProf) {
        window.showToast(`👋 Olá, ${currentProf.name.split(' ')[0]}!`, 'success');
      } else {
        window.showToast('⚠️ Seu e-mail não está cadastrado como professor.', 'error');
      }
    } else {
      window._state.user = null;
      window._state.isAdmin = false;
      window._state.currentProf = null;
      updateAuthUI(null, false, null);
      applyAdminAccess(false);
      renderScannerPanel();
    }
  });

  function updateAuthUI(user, isAdmin, currentProf) {
    const btn = document.getElementById('auth-btn');
    const info = document.getElementById('auth-info');
    if (user) {
      btn.textContent = 'Sair';
      btn.onclick = () => signOut(auth);
      let badge = '';
      if (isAdmin) badge = '<span class="badge-admin">Admin</span>';
      else if (currentProf) badge = '<span class="badge-prof">Professor</span>';
      else badge = '<span class="badge-visitor">Visitante</span>';
      info.innerHTML = `<img src="${user.photoURL}" class="user-avatar" referrerpolicy="no-referrer">
        <span class="user-name">${user.displayName?.split(' ')[0]}</span>
        ${badge}`;
    } else {
      btn.textContent = '🔑 Entrar';
      btn.onclick = () => signInWithPopup(auth, provider).catch(e => {
        if (e.code !== 'auth/popup-closed-by-user') {
          window.showToast('Erro ao fazer login: ' + e.message, 'error');
        }
      });
      info.innerHTML = '';
    }
  }

  function applyAdminAccess(isAdmin) {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? '' : 'none');
    document.querySelectorAll('.admin-tab').forEach(el => el.style.display = isAdmin ? '' : 'none');
  }

  function renderScannerPanel() {
    const { user, isAdmin, currentProf } = window._state;
    const noLogin = document.getElementById('scanner-no-login');
    const notProf = document.getElementById('scanner-not-prof');
    const profPanel = document.getElementById('scanner-prof-panel');

    if (!user) {
      noLogin.style.display = 'block';
      notProf.style.display = 'none';
      profPanel.style.display = 'none';
    } else if (!isAdmin && !currentProf) {
      noLogin.style.display = 'none';
      notProf.style.display = 'block';
      profPanel.style.display = 'none';
    } else {
      noLogin.style.display = 'none';
      notProf.style.display = 'none';
      profPanel.style.display = 'block';
      if (currentProf) {
        const infoEl = document.getElementById('scanner-prof-info');
        const room = getRoomOfProf(currentProf.id);
        infoEl.innerHTML = `
          <div class="prof-ident-card">
            <div class="prof-avatar" style="background:${window.avatarColor(currentProf.name)}">${window.initials(currentProf.name)}</div>
            <div class="prof-info">
              <div class="prof-name">${currentProf.name}</div>
              <div class="prof-subject">${currentProf.subject}</div>
            </div>
            ${room
              ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem">
                   <span class="prof-room">📍 ${room.name}</span>
                   <button class="btn btn-secondary btn-sm" onclick="window.selfDeallocate()">Sair da sala</button>
                 </div>`
              : `<span class="badge badge-muted">Sem sala</span>`
            }
          </div>`;
      } else {
        document.getElementById('scanner-prof-info').innerHTML = '';
      }
    }
  }

  function getRoomOfProf(profId) { return window._state.rooms.find(r => r.profId === profId) || null; }

  function renderPainel() {
    const q = (window._state.searchQuery || '').toLowerCase().trim();
    const allProfs = window._state.professors;

    const inRoom = allProfs.filter(p => getRoomOfProf(p.id));
    document.getElementById('stat-total').textContent = allProfs.length;
    document.getElementById('stat-present').textContent = inRoom.length;
    document.getElementById('stat-absent').textContent = allProfs.length - inRoom.length;

    // Filtra apenas professores alocados em sala
    const profsEmSala = inRoom;

    // Aplica busca somente nos alocados
    const profs = q
      ? profsEmSala.filter(p => p.name.toLowerCase().includes(q) || p.subject.toLowerCase().includes(q))
      : profsEmSala;

    const c = document.getElementById('painel-list');

    if (!allProfs.length) {
      c.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><h3>Nenhum professor cadastrado</h3><p>Um administrador precisa cadastrar os professores</p></div>`;
      return;
    }

    if (q && !profs.length) {
      c.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg><h3>Nenhum resultado</h3><p>Nenhum professor em sala encontrado para "<strong>${q}</strong>"</p></div>`;
      return;
    }

    if (!profs.length) {
      c.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><h3>Nenhum professor em sala</h3><p>Quando um professor se alocar, ele aparecerá aqui.</p></div>`;
      return;
    }

    c.innerHTML = profs.map(p => {
      const room = getRoomOfProf(p.id);
      const ago = p.updatedAt ? `<div class="prof-time">${timeAgo(p.updatedAt)}</div>` : '';
      return `<div class="prof-card present">
        <div class="prof-avatar" style="background:${window.avatarColor(p.name)}">${window.initials(p.name)}</div>
        <div class="prof-info">
          <div class="prof-name">${p.name}</div>
          <div class="prof-subject">${p.subject}</div>
          ${ago}
        </div>
        ${room ? `<span class="prof-room">📍 ${room.name}</span>` : ''}
      </div>`;
    }).join('');
  }

  function renderProfManage() {
    const c = document.getElementById('prof-list-manage');
    const profs = window._state.professors;
    if (!profs.length) { c.innerHTML = `<div class="empty-state" style="padding:2rem 1rem"><h3>Nenhum professor ainda</h3></div>`; return; }
    c.innerHTML = profs.map(p => {
      const room = getRoomOfProf(p.id);
      return `<div class="prof-manage-card">
        <div class="prof-avatar" style="background:${window.avatarColor(p.name)}">${window.initials(p.name)}</div>
        <div class="prof-info">
          <div class="prof-name">${p.name}</div>
          <div class="prof-subject">${p.subject}</div>
          ${p.email ? `<div class="prof-email">${p.email}</div>` : '<div class="prof-email" style="color:var(--error)">⚠️ sem e-mail</div>'}
        </div>
        ${room ? `<span class="badge badge-success">📍 ${room.name}</span>` : `<span class="badge badge-muted">Sem sala</span>`}
        <div class="prof-manage-actions">
          ${room ? `<button class="btn btn-secondary btn-sm" onclick="window.deallocateProf('${p.id}')">Sair da sala</button>` : ''}
          <button class="btn btn-danger btn-sm" onclick="window.removeProfessor('${p.id}')">Excluir</button>
        </div>
      </div>`;
    }).join('');
  }

  function renderRooms() {
    const c = document.getElementById('rooms-list');
    const rooms = window._state.rooms;
    if (!rooms.length) { c.innerHTML = `<div class="empty-state"><h3>Nenhuma sala cadastrada</h3></div>`; return; }
    c.innerHTML = rooms.map(r => {
      const prof = window._state.professors.find(p => p.id === r.profId);
      return `<div class="room-card">
        <div class="room-number">${r.code}</div>
        <div class="room-name">${r.name}</div>
        <div class="room-occupant">${prof ? '👤 '+prof.name : 'Sala livre'}</div>
        <div class="room-actions admin-only"><button class="btn btn-danger btn-sm" onclick="window.deleteRoom('${r.id}')">Excluir</button></div>
      </div>`;
    }).join('');
    applyAdminAccess(window._state.isAdmin);
  }

  function renderQRCodes() {
    const c = document.getElementById('qr-list');
    const rooms = window._state.rooms;
    if (!rooms.length) { c.innerHTML = `<div class="empty-state"><h3>Nenhuma sala cadastrada</h3></div>`; return; }
    c.innerHTML = rooms.map(r => `
      <div class="qr-card">
        <div class="qr-room-name">${r.name}</div>
        <div class="qr-code-wrap" id="qr-${r.id}"></div>
        <button class="btn btn-secondary btn-sm no-print" onclick="window.downloadQR('${r.id}','${r.name}')">⬇ Baixar</button>
      </div>`).join('');
    rooms.forEach(r => {
      const el = document.getElementById('qr-' + r.id);
      if (el && !el.querySelector('canvas'))
        new QRCode(el, { text: r.id, width: 140, height: 140, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H });
    });
  }

  async function renderHistorico() {
    const c = document.getElementById('historico-list');
    c.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted)">Carregando...</div>`;
    try {
      const q = query(logCol, orderBy('ts', 'desc'), limit(50));
      const snap = await getDocs(q);
      if (snap.empty) {
        c.innerHTML = `<div class="empty-state"><h3>Nenhum registro ainda</h3><p>Os movimentos aparecerão aqui assim que professores forem alocados.</p></div>`;
        return;
      }
      c.innerHTML = snap.docs.map(d => {
        const r = d.data();
        const dt = r.ts ? new Date(r.ts.toMillis()).toLocaleString('pt-BR') : '—';
        const icon = r.acao === 'entrada' ? '📥' : '📤';
        const cls  = r.acao === 'entrada' ? 'log-entrada' : 'log-saida';
        return `<div class="log-row ${cls}">
          <span class="log-icon">${icon}</span>
          <div class="log-info">
            <span class="log-prof">${r.profNome}</span>
            <span class="log-detail">${r.acao === 'entrada' ? `entrou em ${r.salaNome}` : `saiu de ${r.salaNome}`}</span>
          </div>
          <span class="log-time">${dt}</span>
        </div>`;
      }).join('');
    } catch(e) {
      c.innerHTML = `<div class="empty-state"><h3>Erro ao carregar histórico</h3><p>${e.message}</p></div>`;
    }
  }
  window.renderHistorico = renderHistorico;

  function updateSelects() {
    const rs = document.getElementById('manual-room-select');
    if (rs) {
      const rv = rs.value;
      rs.innerHTML = '<option value="">— Escolha a sala —</option>' +
        window._state.rooms.map(r => `<option value="${r.id}" ${r.id===rv?'selected':''}>${r.name}</option>`).join('');
    }
    const mp = document.getElementById('manual-prof-select');
    if (mp) {
      const mv = mp.value;
      mp.innerHTML = '<option value="">— Escolha o professor —</option>' +
        window._state.professors.map(p => `<option value="${p.id}" ${p.id===mv?'selected':''}>${p.name} — ${p.subject}</option>`).join('');
    }
  }

  function renderAll() {
    renderPainel(); renderProfManage(); renderRooms(); updateSelects();
    if (window._state.user) {
      window._state.currentProf = findProfByEmail(window._state.user.email);
    }
    renderScannerPanel();
    if (document.getElementById('tab-qrcodes')?.classList.contains('active')) renderQRCodes();
    if (document.getElementById('tab-historico')?.classList.contains('active')) renderHistorico();
    applyAdminAccess(window._state.isAdmin);
  }

  onSnapshot(profsCol, snap => { window._state.professors = snap.docs.map(d=>({id:d.id,...d.data()})); renderAll(); });
  onSnapshot(roomsCol, snap => { window._state.rooms = snap.docs.map(d=>({id:d.id,...d.data()})); renderAll(); });

  async function initDefaultRooms() {
    const snap = await getDocs(roomsCol);
    if (snap.empty) {
      for (let i=1;i<=13;i++) {
        const id = uuidv4();
        await setDoc(doc(db,'salas',id),{name:'Sala '+String(i).padStart(2,'0'),code:String(i).padStart(2,'0'),profId:null});
      }
      window.showToast('13 salas padrão criadas!','success');
    }
  }
  initDefaultRooms();

  function guardAdmin(msg) {
    if (!window._state.isAdmin) { window.showToast(msg || 'Apenas administradores','error'); return false; }
    return true;
  }

  function guardAllocate(profId) {
    const { isAdmin, currentProf, user } = window._state;
    if (!user) { window.showToast('Faça login para continuar', 'error'); return false; }
    if (isAdmin) return true;
    if (currentProf && currentProf.id === profId) return true;
    window.showToast('Você só pode se alocar na própria sala', 'error');
    return false;
  }

  async function logMovimento({ profId, profNome, salaId, salaNome, acao }) {
    try {
      await addDoc(logCol, { profId, profNome, salaId, salaNome, acao, ts: serverTimestamp() });
    } catch(e) { console.warn('Erro ao salvar histórico:', e); }
  }

  window.addProfessor = async () => {
    if (!guardAdmin('Apenas admins podem cadastrar professores')) return;
    const nome = document.getElementById('prof-nome').value.trim();
    const disc = document.getElementById('prof-disciplina').value.trim();
    const email = document.getElementById('prof-email').value.trim().toLowerCase();
    if (!nome || !disc || !email) { window.showToast('Preencha todos os campos, incluindo o e-mail','error'); return; }
    const jaExiste = window._state.professors.find(p => p.email && p.email.toLowerCase() === email);
    if (jaExiste) { window.showToast('Este e-mail já está cadastrado','error'); return; }
    await setDoc(doc(db,'professores','prof-'+Date.now()),{name:nome, subject:disc, email:email});
    document.getElementById('prof-nome').value='';
    document.getElementById('prof-disciplina').value='';
    document.getElementById('prof-email').value='';
    window.showToast('Professor cadastrado!','success');
  };

  // ── Exclusões com confirmação ──────────────────────────────────────────────

  window.removeProfessor = (id) => {
    if (!guardAdmin()) return;
    const prof = window._state.professors.find(p => p.id === id);
    if (!prof) return;
    showConfirmModal({
      icon: '🗑️',
      iconType: 'danger',
      title: 'Excluir professor?',
      body: `Tem certeza que deseja excluir <strong>${prof.name}</strong>? Esta ação não pode ser desfeita.`,
      confirmLabel: 'Sim, excluir',
      cancelLabel: 'Cancelar',
      onConfirm: async () => {
        const room = window._state.rooms.find(r => r.profId === id);
        if (room) await updateDoc(doc(db,'salas',room.id),{profId:null});
        await deleteDoc(doc(db,'professores',id));
        window.showToast('Professor removido','info');
      }
    });
  };

  window.deallocateProf = (profId) => {
    if (!guardAdmin()) return;
    const prof = window._state.professors.find(p => p.id === profId);
    const room = window._state.rooms.find(r => r.profId === profId);
    if (!room) { window.showToast('Professor não está em nenhuma sala','info'); return; }
    showConfirmModal({
      icon: '🚪',
      iconType: 'warn',
      title: 'Retirar da sala?',
      body: `Deseja retirar <strong>${prof?.name}</strong> de <strong>${room.name}</strong>?`,
      confirmLabel: 'Sim, retirar',
      cancelLabel: 'Cancelar',
      onConfirm: async () => {
        await updateDoc(doc(db,'salas',room.id),{profId:null});
        await updateDoc(doc(db,'professores',profId),{updatedAt:serverTimestamp()});
        await logMovimento({ profId, profNome: prof?.name||'?', salaId: room.id, salaNome: room.name, acao: 'saida' });
        window.showToast('Professor saiu da sala','info');
      }
    });
  };

  window.selfDeallocate = () => {
    const prof = window._state.currentProf;
    if (!prof) return;
    if (!window._state.user) { window.showToast('Faça login para continuar', 'error'); return; }
    const room = window._state.rooms.find(r => r.profId === prof.id);
    if (!room) { window.showToast('Você não está em nenhuma sala','info'); return; }
    showConfirmModal({
      icon: '🚪',
      iconType: 'warn',
      title: 'Sair da sala?',
      body: `Deseja sair de <strong>${room.name}</strong>?`,
      confirmLabel: 'Sim, sair',
      cancelLabel: 'Cancelar',
      onConfirm: async () => {
        await updateDoc(doc(db,'salas',room.id),{profId:null});
        await updateDoc(doc(db,'professores',prof.id),{updatedAt:serverTimestamp()});
        await logMovimento({ profId: prof.id, profNome: prof.name, salaId: room.id, salaNome: room.name, acao: 'saida' });
        window.showToast(`Você saiu de ${room.name}`,'info');
      }
    });
  };

  window.deleteRoom = (id) => {
    if (!guardAdmin()) return;
    const room = window._state.rooms.find(r => r.id === id);
    if (!room) return;
    const ocupada = window._state.professors.find(p => p.id === room.profId);
    showConfirmModal({
      icon: '🏫',
      iconType: 'danger',
      title: 'Excluir sala?',
      body: ocupada
        ? `<strong>${room.name}</strong> está ocupada por <strong>${ocupada.name}</strong>. Excluir também removerá a alocação. Esta ação não pode ser desfeita.`
        : `Tem certeza que deseja excluir <strong>${room.name}</strong>? Esta ação não pode ser desfeita.`,
      confirmLabel: 'Sim, excluir',
      cancelLabel: 'Cancelar',
      onConfirm: async () => {
        await deleteDoc(doc(db,'salas',id));
        window.showToast('Sala removida','info');
      }
    });
  };

  window.manualDeallocate = () => {
    if (!guardAdmin()) return;
    const profId = document.getElementById('manual-prof-select').value;
    if (!profId) { window.showToast('Selecione o professor','error'); return; }
    const prof = window._state.professors.find(p => p.id === profId);
    const room = window._state.rooms.find(r => r.profId === profId);
    if (!room) { window.showToast(`${prof?.name} não está em nenhuma sala`,'info'); return; }
    showConfirmModal({
      icon: '🚪',
      iconType: 'warn',
      title: 'Retirar da sala?',
      body: `Deseja retirar <strong>${prof?.name}</strong> de <strong>${room.name}</strong>?`,
      confirmLabel: 'Sim, retirar',
      cancelLabel: 'Cancelar',
      onConfirm: async () => {
        await updateDoc(doc(db,'salas',room.id),{profId:null});
        await updateDoc(doc(db,'professores',profId),{updatedAt:serverTimestamp()});
        await logMovimento({ profId, profNome: prof?.name||'?', salaId: room.id, salaNome: room.name, acao: 'saida' });
        window.showToast(`${prof?.name} saiu da sala`,'info');
      }
    });
  };

  // ──────────────────────────────────────────────────────────────────────────

  window.addSala = async () => {
    if (!guardAdmin('Apenas admins podem cadastrar salas')) return;
    const nome=document.getElementById('sala-nome').value.trim();
    const codigo=document.getElementById('sala-codigo').value.trim();
    if (!nome) { window.showToast('Informe o nome da sala','error'); return; }
    const id = uuidv4();
    await setDoc(doc(db,'salas',id),{name:nome,code:codigo||nome,profId:null});
    document.getElementById('sala-nome').value='';
    document.getElementById('sala-codigo').value='';
    window.showToast('Sala cadastrada!','success');
  };

  window.manualAllocate = async () => {
    if (!guardAdmin()) return;
    const profId=document.getElementById('manual-prof-select').value;
    const roomId=document.getElementById('manual-room-select').value;
    if (!profId||!roomId) { window.showToast('Selecione professor e sala','error'); return; }
    const prof=window._state.professors.find(p=>p.id===profId);
    const room=window._state.rooms.find(r=>r.id===roomId);
    if (!prof||!room) { window.showToast('Não reconhecido','error'); return; }

    const currentOccupant = room.profId
      ? window._state.professors.find(p => p.id === room.profId)
      : null;

    if (currentOccupant && currentOccupant.id !== profId) {
      showOccupiedModal({
        roomName: room.name,
        currentProfName: currentOccupant.name,
        newProfName: prof.name,
        onConfirm: async () => {
          const old=window._state.rooms.find(r=>r.profId===profId);
          if (old) {
            await updateDoc(doc(db,'salas',old.id),{profId:null});
            await logMovimento({ profId, profNome: prof.name, salaId: old.id, salaNome: old.name, acao: 'saida' });
          }
          await updateDoc(doc(db,'salas',room.id),{profId:profId});
          await updateDoc(doc(db,'professores',profId),{updatedAt:serverTimestamp()});
          await logMovimento({ profId, profNome: prof.name, salaId: room.id, salaNome: room.name, acao: 'entrada' });
          window.showToast(`✅ ${prof.name} → ${room.name}`,'success');
        },
        onCancel: () => window.showToast('Alocação cancelada','info')
      });
      return;
    }

    const old=window._state.rooms.find(r=>r.profId===profId);
    if (old) {
      await updateDoc(doc(db,'salas',old.id),{profId:null});
      await logMovimento({ profId, profNome: prof.name, salaId: old.id, salaNome: old.name, acao: 'saida' });
    }
    await updateDoc(doc(db,'salas',roomId),{profId:profId});
    await updateDoc(doc(db,'professores',profId),{updatedAt:serverTimestamp()});
    await logMovimento({ profId, profNome: prof.name, salaId: room.id, salaNome: room.name, acao: 'entrada' });
    window.showToast(`✅ ${prof.name} → ${room.name}`,'success');
  };

  window.downloadQR = (roomId, roomName) => {
    const el=document.getElementById('qr-'+roomId);
    const canvas=el?.querySelector('canvas');
    if (!canvas) { window.showToast('QR Code carregando...','error'); return; }
    const link=document.createElement('a');
    link.download='qrcode-'+roomName.replace(/\s+/g,'-').toLowerCase()+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    window.showToast('Download iniciado!','success');
  };

  window.printAllQR = () => { renderQRCodes(); setTimeout(()=>window.print(),400); };
  window.renderQRCodes = renderQRCodes;

  let _scanner=null, _scannerActive=false;

  function showOccupiedModal({ roomName, currentProfName, newProfName, onConfirm, onCancel }) {
    const modal = document.getElementById('occupied-modal');
    document.getElementById('occupied-room-name').textContent = roomName;
    document.getElementById('occupied-current-prof').textContent = currentProfName;
    document.getElementById('occupied-new-prof').textContent = newProfName;
    modal.classList.add('open');

    const btnConfirm = document.getElementById('occupied-confirm');
    const btnCancel  = document.getElementById('occupied-cancel');

    function cleanup() {
      modal.classList.remove('open');
      btnConfirm.replaceWith(btnConfirm.cloneNode(true));
      btnCancel.replaceWith(btnCancel.cloneNode(true));
    }

    document.getElementById('occupied-confirm').addEventListener('click', () => { cleanup(); onConfirm(); }, { once: true });
    document.getElementById('occupied-cancel').addEventListener('click',  () => { cleanup(); onCancel();  }, { once: true });
  }

  async function doAllocate(db, profId, room, prof) {
    if (!guardAllocate(profId)) return;
    const old = window._state.rooms.find(r => r.profId === profId);
    if (old) {
      await updateDoc(doc(db,'salas',old.id),{profId:null});
      await logMovimento({ profId, profNome: prof?.name||'?', salaId: old.id, salaNome: old.name, acao: 'saida' });
    }
    await updateDoc(doc(db,'salas',room.id),{profId:profId});
    await updateDoc(doc(db,'professores',profId),{updatedAt:serverTimestamp()});
    await logMovimento({ profId, profNome: prof?.name||'?', salaId: room.id, salaNome: room.name, acao: 'entrada' });
    document.getElementById('scan-result-box').className='scan-result success';
    document.getElementById('scan-result-box').textContent=`✅ ${prof?.name} alocado(a) na ${room.name}!`;
  }

  window.startScanner = () => {
    const { user, isAdmin, currentProf } = window._state;
    if (!user) { window.showToast('Faça login para escanear','error'); return; }
    if (!isAdmin && !currentProf) { window.showToast('Seu e-mail não está cadastrado como professor','error'); return; }
    if (_scannerActive) return;

    document.getElementById('scanner-placeholder').style.display='none';
    document.getElementById('scanner-overlay').style.display='flex';

    _scanner = new Html5Qrcode('scanner-container');
    _scannerActive = true;

    _scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      async (decodedText) => {
        if (!_scannerActive) return;
        _scannerActive = false;
        await _scanner.stop().catch(()=>{});
        document.getElementById('scanner-overlay').style.display='none';
        document.getElementById('scanner-placeholder').style.display='flex';

        const room = window._state.rooms.find(r => r.id === decodedText);
        if (!room) {
          document.getElementById('scan-result-box').className='scan-result error';
          document.getElementById('scan-result-box').textContent='❌ QR Code inválido ou sala não encontrada.';
          return;
        }

        const { isAdmin, currentProf } = window._state;
        const profId = isAdmin
          ? (window._state.professors[0]?.id || null)
          : currentProf?.id;

        if (!profId) {
          document.getElementById('scan-result-box').className='scan-result error';
          document.getElementById('scan-result-box').textContent='❌ Nenhum professor identificado.';
          return;
        }

        const prof = window._state.professors.find(p => p.id === profId);

        if (room.profId && room.profId !== profId) {
          const currentOccupant = window._state.professors.find(p => p.id === room.profId);
          showOccupiedModal({
            roomName: room.name,
            currentProfName: currentOccupant?.name || '?',
            newProfName: prof?.name || '?',
            onConfirm: () => doAllocate(db, profId, room, prof),
            onCancel: () => {
              document.getElementById('scan-result-box').className='scan-result error';
              document.getElementById('scan-result-box').textContent='Alocação cancelada.';
            }
          });
        } else {
          await doAllocate(db, profId, room, prof);
        }
      },
      () => {}
    ).catch(err => {
      _scannerActive = false;
      document.getElementById('scanner-overlay').style.display='none';
      document.getElementById('scanner-placeholder').style.display='flex';
      window.showToast('Erro ao acessar câmera: ' + err,'error');
    });
  };

  window.stopScanner = () => {
    if (_scanner && _scannerActive) {
      _scannerActive = false;
      _scanner.stop().catch(()=>{});
    }
    document.getElementById('scanner-overlay').style.display='none';
    document.getElementById('scanner-placeholder').style.display='flex';
  };

  window.showToast = (msg, type='info') => {
    const t=document.createElement('div');
    t.className=`toast toast-${type}`;
    t.textContent=msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(()=>t.classList.add('show'),10);
    setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); },3500);
  };

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-'+target)?.classList.add('active');
        if (target==='qrcodes') renderQRCodes();
        if (target==='historico') renderHistorico();
      });
    });

    const searchInput = document.getElementById('painel-search');
    if (searchInput) {
      searchInput.addEventListener('input', e => {
        window._state.searchQuery = e.target.value;
        renderPainel();
      });
    }
  });
</script>
